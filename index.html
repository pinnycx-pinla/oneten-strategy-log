<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能构建 | ONETEN QUANT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script type="module" src="/main.js"></script>
</head>
<body>
  <!-- Vanta.js 3D Background (kept for switcher) -->
  <div id="vanta-bg"></div>
  <!-- Nebula Slow Motion Background -->
  <div id="nebula-bg"></div>
  <!-- Cosmic Nebula Background -->
  <div id="cosmic-bg"></div>
  <!-- Milky Way Background -->
  <div id="galaxy-bg"></div>

  <!-- Main Container -->
  <div class="app-container">
    <!-- Header -->
    <header class="desktop-header">
      <div class="top-nav">
        <div class="language-selector">
          <span>한국어</span>
          <span>English</span>
          <span class="active">中文</span>
        </div>
      </div>
      <div class="title-section">
        <h1 class="main-title">ONETEN QUANT — <span id="hero-tagline">智能构建</span></h1>
        <p class="subtitle" id="hero-subtitle">从策略到系统 · 从对话到代码 · 从代码到公司</p>
      </div>
      <div class="connection-graphic">
        <div class="avatar-wrap">
          <div class="glow-ring"></div>
          <img src="/wen_tian.png" alt="文天">
          <span class="name" id="header-user-name">文天</span>
        </div>
        <div class="line-path">
          <svg preserveAspectRatio="none" viewBox="0 0 800 50">
            <path d="M 0 25 C 200 25, 300 25, 400 25 C 450 25, 470 45, 520 45 L 800 45" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" style="filter: drop-shadow(0 0 2px rgba(212,180,128,0.5));"/>
            <defs>
              <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#b18f5d" stop-opacity="0.1"/>
                <stop offset="40%" stop-color="#e0c196" stop-opacity="0.8"/>
                <stop offset="60%" stop-color="#e0c196" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#b18f5d" stop-opacity="0.1"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="avatar-wrap">
          <img src="/dali_new_transparent.png" alt="DALI" class="dali-3d">
          <span class="name">DALI</span>
        </div>
      </div>
    </header>

    <!-- Page Navigation -->
    <nav class="page-nav">
      <button id="btn-prev" class="nav-btn" disabled>← 前一天</button>
      <div class="page-info">
        <span id="page-date"></span>
        <span id="page-dots"></span>
      </div>
      <button id="btn-next" class="nav-btn">后一天 →</button>
    </nav>
    <button id="btn-fx-demo" class="nav-btn" style="margin-bottom:12px;font-size:11px;opacity:0.6">✦ 特效预览</button>

    <!-- Chat Content (rendered by JS) -->
    <div class="frameless-chat" id="chat-content"></div>
  </div>

  <!-- Theme Switcher Button -->
  <button id="btn-theme">◈ 风格 A</button>
  <!-- Effect Switcher Button -->
  <button id="fx-btn">✦ 切换特效</button>
  <!-- Font Size Toggle -->
  <button id="btn-fontsize" title="字体大小">A</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</body>
</html>
